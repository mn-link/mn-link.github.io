<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>lit風リンク</title>

<!-- ✅ OGP / X Card（mn-link に合わせる） -->
<meta property="og:type" content="website">
<meta property="og:title" content="🔥今だけ無料｜こっそり見れる😈">
<meta property="og:description" content="目的別に分けた。タップしたらすぐ見れる。">
<meta property="og:url" content="https://mn-link.github.io/">
<meta property="og:image" content="https://mn-link.github.io/ogp.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="🔥今だけ無料｜こっそり見れる😈">
<meta name="twitter:description" content="目的別に分けた。タップしたらすぐ見れる。">
<meta name="twitter:image" content="https://mn-link.github.io/ogp.jpg">

<style>
  :root{
    --pink:#ff6fd6;
    --cardRadius:18px;
    --shadow:0 12px 26px rgba(0,0,0,.18);
    --chipBg:rgba(255,255,255,.70);
    --chipText:#222;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    background:var(--pink);
  }
  .wrap{
    width:min(430px, 100%);
    margin:0 auto;
    padding:14px 12px 40px;
  }

  /* 画像カード（lit.link風） */
  .tile{
    position:relative;
    display:block;
    border-radius:var(--cardRadius);
    overflow:hidden;
    box-shadow:var(--shadow);
    margin:14px 0;
    text-decoration:none;
    background:#111;
  }
  .tile img{
    width:100%;
    height:240px;
    object-fit:cover;
    display:block;
    opacity:.97;
  }

  /* 左上ラベル */
  .chip{
    position:absolute;
    top:12px;
    left:12px;
    background:var(--chipBg);
    color:var(--chipText);
    font-weight:800;
    font-size:13px;
    padding:8px 10px;
    border-radius:10px;
    backdrop-filter: blur(6px);
  }

  /* 左下ヒント */
  .hint{
    position:absolute;
    bottom:12px;
    left:12px;
    background:rgba(255,255,255,.55);
    color:#333;
    font-weight:700;
    font-size:12px;
    padding:8px 10px;
    border-radius:10px;
    backdrop-filter: blur(6px);
  }

  /* 再生ボタン（上だけ） */
  .play{
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    pointer-events:none;
  }
  .play .btn{
    width:74px;height:74px;
    border-radius:999px;
    background:#ff2b5a;
    display:grid;
    place-items:center;
    box-shadow:0 10px 18px rgba(0,0,0,.25);
  }
  .play .tri{
    width:0;height:0;
    border-left:18px solid #fff;
    border-top:11px solid transparent;
    border-bottom:11px solid transparent;
    margin-left:4px;
  }

  /* 下の余白感（スクショっぽく） */
  .spacer{height:10px}

  /* 注意書き */
  .fine{
    text-align:center;
    color:rgba(0,0,0,.45);
    font-size:11px;
    margin-top:8px;
  }
</style>
</head>

<body>
  <div class="wrap">

    <!-- 上：抜きたい人（再生ボタン付き） -->
    <a class="tile" href="https://lite.tiktok.com/t/ZS9dRrjqtTSkR-8vvVR/" target="_blank" rel="noopener">
      <img src="./top.jpg" alt="top">
      <div class="chip">※抜きたい人</div>
      <div class="hint">タップで再生</div>
      <div class="play" aria-hidden="true">
        <div class="btn"><div class="tri"></div></div>
      </div>
    </a>

    <!-- 下：ハメたい人（再生ボタン無し） -->
    <a class="tile" href="https://lite.tiktok.com/t/ZS9dRrjqtTSkR-8vvVR/" target="_blank" rel="noopener">
      <img src="./bottom.jpg" alt="bottom">
      <div class="chip">※ハメたい人</div>
      <div class="hint">画像をタップ</div>
    </a>

    <div class="fine">※18歳未満は閲覧禁止</div>
    <div class="spacer"></div>
  </div>
</body>
</html>
