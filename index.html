<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mn-link</title>

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:60px 18px 40px;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
      background: linear-gradient(180deg, #ff53d1 0%, #ff79d8 45%, #ff4fb8 100%);
    }

    .wrap{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      gap:28px;
    }

    .card{
      position:relative;
      display:block;
      width:100%;
      height:240px;
      border-radius:28px;
      overflow:hidden;
      background:#111;
      box-shadow:0 18px 45px rgba(0,0,0,.25);
      text-decoration:none;
      -webkit-tap-highlight-color: transparent;
    }

    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(1.05);
    }

    .label{
      position:absolute;
      top:14px;
      left:14px;
      background:#e9e9e9;
      color:#111;
      font-size:14px;
      padding:10px 14px;
      border-radius:16px;
      line-height:1;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      font-weight:600;
    }

    .note{
      text-align:center;
      font-size:12px;
      color: rgba(0,0,0,.55);
      margin-top:6px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- 上：抜きたい人 -->
    <a class="card" href="https://lite.tiktok.com/t/ZS9dRrjqtTSkR-8vvVR/" target="_blank" rel="noopener">
      <!-- ここは top.jpg をGitHubに置くか、Imgur直リンクに変えてOK -->
      <img src="https://i.ibb.co/Df57jR8M/image.jpg
      <div class="label">※抜きたい人</div>
    </a>

    <!-- 下：ハメたい人 -->
    <a class="card" href="https://lite.tiktok.com/t/ZS9dRrjqtTSkR-8vvVR/" target="_blank" rel="noopener">
      <img src="https://i.imgur.com/3eSqD1r.jpg" alt="bottom">
      <div class="label">※ハメたい人</div>
    </a>

    <div class="note">※18歳未満は閲覧禁止</div>
  </div>
</body>
</html>
