<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ X(Twitter)リンクカード用 -->
<meta property="og:type" content="website">
<meta property="og:title" content="🔥今だけ無料｜こっそり見れる😈">
<meta property="og:description" content="目的別に分けた。タップしたらすぐ見れる。">
<meta property="og:url" content="https://mn-link.github.io/">
<meta property="og:image" content="https://mn-link.github.io/ogp.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="🔥今だけ無料｜こっそり見れる😈">
<meta name="twitter:description" content="目的別に分けた。タップしたらすぐ見れる。">

<style>
  :root{ --pink1:#ff6fd6; --pink2:#ff73c7; }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",system-ui;
    background:linear-gradient(180deg,var(--pink1),var(--pink2));
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  .wrap{ width:100%; max-width:420px; padding:20px; }
  .card{
    position:relative;
    display:block;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:22px;
    box-shadow:0 12px 26px rgba(0,0,0,.18);
    text-decoration:none;
    background:#111;
  }
  .card img{ width:100%; height:240px; object-fit:cover; display:block; }
  .label{
    position:absolute; top:12px; left:12px;
    background:rgba(255,255,255,.75);
    padding:8px 12px; border-radius:10px;
    font-weight:700; font-size:13px; color:#222;
    backdrop-filter: blur(6px);
  }
  .play{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:72px; height:72px; border-radius:50%;
    background:#ff2b5a;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 20px rgba(0,0,0,.3);
    pointer-events:none;
  }
  .play:after{
    content:"";
    border-left:18px solid #fff;
    border-top:11px solid transparent;
    border-bottom:11px solid transparent;
    margin-left:4px;
  }
  .note{
    text-align:center;
    font-size:12px;
    color:rgba(0,0,0,.5);
    margin-top:10px;
  }
</style>
</head>

<body>
<div class="wrap">

  <a class="card" href="https://lite.tiktok.com/t/ZS9dRrjqtTSkR-8vvVR/" target="_blank" rel="noopener">
    <img src="top.jpg" alt="top">
    <div class="label">※抜きたい人</div>
    <div class="play"></div>
  </a>

<a class="card" href="https://lite.tiktok.com/t/ZS9dRrjqtTSkR-8vvVR/" target="_blank">
  <img src="https://i.imgur.com/3eSqD1r.jpg" alt="bottom">
  <div class="label">※ハメたい人</div>
</a>

  <div class="note">※18歳未満は閲覧禁止</div>

</div>
</body>
</html>
